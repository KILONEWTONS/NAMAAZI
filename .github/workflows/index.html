<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAMAAZI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600&display=swap" rel="stylesheet">
<style>
    /* Reset and Layout */
    body {
        background-color: #000000;
        color: #ffffff;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh; /* Takes up 100% of the viewport height */
        text-align: center;
        font-family: 'Hanken Grotesk', sans-serif;
        overflow: hidden; /* Prevents scrollbars */
    }

    /* Main Brand Styling */
    .brand-name {
        font-weight: 600; /* SemiBold */
        /* clamp() ensures the text is responsive: min size, preferred scaling, max size */
        font-size: clamp(3rem, 10vw, 6rem); 
        letter-spacing: 0.05em;
        margin: 0;
        line-height: 1;
    }

    /* Domain Name Styling */
    .domain-name {
        font-weight: 400;
        font-size: clamp(1rem, 3vw, 1.5rem);
        letter-spacing: 0.15em;
        margin-top: 16px;
        color: rgba(255, 255, 255, 0.7); /* Slightly muted white for a premium contrast */
        text-transform: lowercase;
    }
</style>
</head>
<body>

    <h1 class="brand-name">NAMAAZI</h1>
    <div class="domain-name">namaazi.com</div>

</body>
</html>
